<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #f5f2eb;
            --bg2:        #ede9df;
            --ink:        #1a1814;
            --ink-muted:  #7a7060;
            --accent:     #d4420a;
            --accent2:    #1a4d8c;
            --border:     #c8c0b0;
            --radius:     4px;
        }

        html, body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; }

        body {
            background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .topbar {
            background: var(--ink);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.15em;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-brand::before { content: '✈'; color: var(--accent); font-size: 1.2rem; }

        .topbar-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: #888;
            letter-spacing: 0.1em;
        }

        .runway {
            height: 6px;
            background: repeating-linear-gradient(90deg, var(--accent) 0px, var(--accent) 30px, transparent 30px, transparent 50px);
            opacity: 0.7;
        }

        .main {
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            animation: fadeIn 0.4s ease both;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); letter-spacing: 0.08em; color: var(--ink); line-height: 1; margin-bottom: 4px; }
        .page-subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--ink-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }

        .flight-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
        .flight-item { border-bottom: 1px solid var(--border); animation: fadeIn 0.4s ease both; }
        .flight-item:first-child { border-top: 1px solid var(--border); }

        .flight-link { display: grid; grid-template-columns: 48px 1fr auto; align-items: center; gap: 20px; padding: 18px 16px; text-decoration: none; color: var(--ink); transition: background 0.15s; }
        .flight-link:hover { background: var(--bg2); }

        .flight-num { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--accent); font-weight: 500; letter-spacing: 0.05em; }
        .flight-route { display: flex; align-items: center; gap: 12px; font-size: 1rem; font-weight: 500; }
        .flight-route .arrow { color: var(--ink-muted); font-size: 0.75rem; }
        .flight-arrow-icon { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--ink-muted); letter-spacing: 0.1em; text-transform: uppercase; }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 32px; }
        .detail-cell { background: var(--bg); padding: 20px 24px; }
        .detail-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-muted); margin-bottom: 6px; }
        .detail-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.05em; color: var(--ink); line-height: 1; }

        .section-heading { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-muted); margin-bottom: 12px; margin-top: 32px; display: flex; align-items: center; gap: 10px; }
        .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .passenger-list { list-style: none; display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
        .passenger-item { padding: 13px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
        .passenger-item:last-child { border-bottom: none; }
        .passenger-item::before { content: '●'; color: var(--accent2); font-size: 0.4rem; }

        .empty-state { padding: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--ink-muted); text-align: center; border: 1px dashed var(--border); border-radius: var(--radius); }

        .booking-form { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
        .form-select { flex: 1; padding: 11px 14px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'IBM Plex Sans', sans-serif; font-size: 0.875rem; color: var(--ink); outline: none; transition: border-color 0.2s; cursor: pointer; }
        .form-select:focus { border-color: var(--accent2); }

        .btn-book { padding: 11px 24px; background: var(--accent); color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.2s, transform 0.15s; white-space: nowrap; }
        .btn-book:hover { opacity: 0.85; transform: translateY(-1px); }

        .back-link { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); text-decoration: none; margin-bottom: 28px; transition: color 0.2s; }
        .back-link:hover { color: var(--ink); }
        .back-link::before { content: '←'; }

        .flight-badge { display: inline-block; background: var(--accent); color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.12em; padding: 3px 10px; border-radius: 2px; margin-bottom: 10px; }
    </style>
</head>
<body data-testid="app-root">
    <nav class="topbar" data-testid="topbar" role="navigation" aria-label="Main navigation">
        <span class="topbar-brand" data-testid="topbar-brand">AirLine</span>
        <span class="topbar-time" id="clock" data-testid="topbar-clock" aria-live="polite"></span>
    </nav>
    <div class="runway" role="presentation"></div>

    <main class="main" data-testid="main-content" role="main">
        {% block body %}
        {% endblock %}
    </main>

    <script>
        function tick() {
            const now = new Date();
            document.getElementById('clock').textContent =
                now.toUTCString().replace('GMT', 'UTC');
        }
        tick(); setInterval(tick, 1000);
    </script>
</body>
</html>

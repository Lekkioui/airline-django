<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
 
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: rgba(255,255,255,0.07);
            --accent: #c8f060;
            --accent-dim: rgba(200, 240, 96, 0.12);
            --text: #f0f0f0;
            --text-muted: #888;
            --radius: 16px;
        }
 
        html, body {
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }
 
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(200, 240, 96, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 90% 90%, rgba(100, 80, 255, 0.06) 0%, transparent 60%);
        }
 
        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }
 
        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }
 
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
 
        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            color: var(--text);
        }
 
        .brand-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }
 
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 32px 64px rgba(0,0,0,0.4),
                0 0 80px rgba(200,240,96,0.03);
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
 
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="brand">
            <span class="brand-mark">
                <span class="brand-dot"></span>
                USERS
            </span>
        </div>
        <div class="card">
            {% block body %}
            {% endblock %}
        </div>
    </div>
</body>
</html>
